identity:
  name: "qdrant-get-collection-info"
  author: "yaxuanm"
  label:
    en_US: "Qdrant · Get Collection Info"
    zh_Hans: "Qdrant · 集合信息"
description:
  human:
    en_US: "Fetch metadata, configuration, and status for a specific Qdrant collection."
    zh_Hans: "获取指定 Qdrant 集合的元数据、配置与状态。"
  llm: "Return Qdrant collection info (configuration + status)."
parameters:
  - name: operation
    type: string
    required: true
    label:
      en_US: Operation
      zh_Hans: 操作
    human_description:
      en_US: "Fixed value: get_collection_info."
      zh_Hans: "固定填写 get_collection_info。"
    form: llm
    default: "get_collection_info"
  - name: items
    type: string
    required: true
    label:
      en_US: Body (JSON)
      zh_Hans: 请求体（JSON）
    human_description:
      en_US: "Advanced use only. Keep `[{}]` unless you need a custom HTTP body array."
      zh_Hans: "仅用于高级场景。如无特殊需求请保持 `[{}]`。"
    form: llm
  - name: options
    type: string
    required: true
    label:
      en_US: Options (JSON)
      zh_Hans: 选项（JSON）
    human_description:
      en_US: "Provide the collection name, e.g. {\"collection\":\"my_collection\"}."
      zh_Hans: "提供集合名称，例如 {\"collection\":\"my_collection\"}。"
    help:
      en_US: |
        Required keys:
        - collection: target collection name (string, case-sensitive)
      zh_Hans: |
        必填字段：
        - collection：目标集合名称（区分大小写）
    form: llm
extra:
  python:
    source: tools/qdrant.py

