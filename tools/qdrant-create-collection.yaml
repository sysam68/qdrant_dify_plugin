identity:
  name: "qdrant-create-collection"
  author: "yaxuanm"
  label:
    en_US: "Qdrant · Create Collection"
    zh_Hans: "Qdrant · 创建集合"
description:
  human:
    en_US: "Explicitly create a Qdrant collection by supplying the vectors configuration."
    zh_Hans: "通过自定义 vectors 配置显式创建 Qdrant 集合。"
  llm: "Create a Qdrant collection via the management API."
parameters:
  - name: operation
    type: string
    required: true
    label:
      en_US: Operation
      zh_Hans: 操作
    human_description:
      en_US: "Fixed value: create_collection."
      zh_Hans: "固定填写 create_collection。"
    form: llm
    default: "create_collection"
  - name: items
    type: string
    required: true
    label:
      en_US: Body (JSON)
      zh_Hans: 请求体（JSON）
    human_description:
      en_US: "Advanced use only. Leave as `[{}]` unless you need to send a custom HTTP body array."
      zh_Hans: "仅用于高级场景。除非需要完全自定义 HTTP Body，一般保持 `[{}]`。"
    form: llm
  - name: options
    type: string
    required: true
    label:
      en_US: Options (JSON)
      zh_Hans: 选项（JSON）
    human_description:
      en_US: "Collection settings, e.g. {\"collection\":\"my_collection\",\"vectors\":{\"size\":1536,\"distance\":\"Cosine\"}}."
      zh_Hans: "集合配置，例如 {\"collection\":\"my_collection\",\"vectors\":{\"size\":1536,\"distance\":\"Cosine\"}}。"
    help:
      en_US: |
        Required keys:
        - collection: collection name (string)
        - vectors.size: vector dimension (int)
        - vectors.distance: Cosine / Euclid / Dot

        Optional fields: hnsw_config, optimizers_config, wal_config, quantization_config, etc.
      zh_Hans: |
        必填字段：
        - collection：集合名称
        - vectors.size：向量维度（整数）
        - vectors.distance：Cosine / Euclid / Dot

        可选字段：hnsw_config、optimizers_config、wal_config、quantization_config 等。
    form: llm
extra:
  python:
    source: tools/qdrant.py
